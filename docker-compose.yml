services:
  db:
    image: postgres:latest
    container_name: dev_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - 5436:5432
    volumes:
      - pg_data:/var/lib/postgresql
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - 6545:6379

volumes:
  pg_data: